---
layout: default
title: バックナンバー一覧
---
<style>
  .page-title { font-size: 1.4rem; color: #1a5276; margin-bottom: 1.5rem; border-bottom: 2px solid #1a5276; padding-bottom: 0.5rem; }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem; }
  .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; transition: transform 0.15s, box-shadow 0.15s; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,0.15); }
  .card-top { background: #2e86c1; color: white; padding: 1rem 1.2rem; }
  .card-top .issue { font-size: 1.3rem; font-weight: bold; }
  .card-top .date { font-size: 0.85rem; opacity: 0.85; margin-top: 0.3rem; }
  .card-body { padding: 1rem 1.2rem; font-size: 0.88rem; color: #555; line-height: 1.6; }
  .card-footer { padding: 0.8rem 1.2rem; border-top: 1px solid #eee; }
  .btn { display: inline-block; background: #1a5276; color: white; padding: 0.45rem 1.1rem; border-radius: 5px; font-size: 0.88rem; }
  .btn:hover { background: #154360; text-decoration: none; }
</style>

<h2 class="page-title">バックナンバー一覧</h2>
<div class="card-grid">
  {% for post in site.posts %}
  <div class="card">
    <div class="card-top">
      <div class="issue">{{ post.issue }}</div>
      <div class="date">{{ post.date | date: "%Y年%m月発行" }}</div>
    </div>
    <div class="card-body">{{ post.description }}</div>
    <div class="card-footer">
      <a href="{{ post.url | prepend: site.baseurl }}" class="btn">閲覧する</a>
    </div>
  </div>
  {% endfor %}
</div>
