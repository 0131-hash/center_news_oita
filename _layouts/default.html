<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif; background: #f5f5f5; color: #333; line-height: 1.7; }
    a { color: #1a5276; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Header */
    header { background: #1a5276; color: white; padding: 1rem 0; }
    header .inner { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    header h1 a { color: white; font-size: 1.3rem; }
    header nav a { color: rgba(255,255,255,0.85); margin-left: 1.5rem; font-size: 0.9rem; }

    /* Main */
    main { max-width: 900px; margin: 2.5rem auto; padding: 0 1.5rem; }

    /* Footer */
    footer { text-align: center; padding: 2rem; font-size: 0.8rem; color: #999; border-top: 1px solid #ddd; margin-top: 3rem; }
  </style>
  {% if page.extra_css %}{{ page.extra_css }}{% endif %}
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
<header>
  <div class="inner">
    <h1><a href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
    <nav>
      <a href="{{ site.baseurl }}/">一覧</a>
      <a href="{{ site.baseurl }}/admin/">管理画面</a>
    </nav>
  </div>
</header>
<main>
  {{ content }}
</main>
<footer>
  大分県産業科学技術センター（Oita Industrial Research Institute）
</footer>
</body>
</html>
